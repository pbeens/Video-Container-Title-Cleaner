<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Container Title Cleaner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="panel hero">
        <div class="hero-top">
          <h1>Video Container Title Cleaner</h1>
          <div class="hero-links">
            <button id="support-button" class="btn" type="button">Support</button>
            <button id="coffee-button" class="btn accent" type="button">Buy Me a Coffee</button>
          </div>
        </div>
        <p>
          Drop video files or folders to scan recursively, inspect container title metadata, and remove container titles in bulk.
        </p>
      </header>

      <section class="panel controls">
        <div class="control-row">
          <div id="drop-zone" class="drop-zone" tabindex="0" role="button" aria-label="Drop videos or folders">
            <strong>Drop videos or folders here</strong>
            <span>or click to choose files/folders</span>
          </div>

          <div class="control-side">
            <div class="actions">
              <button id="inspect-button" class="btn primary" type="button">Inspect Titles</button>
              <button id="clear-button" class="btn" type="button">Clear</button>
              <button id="remove-button" class="btn danger" type="button">Remove Container Titles</button>
              <button id="stop-button" class="btn warning" type="button" hidden>Stop Processing</button>
            </div>
            <label class="option-check" for="include-no-title-checkbox">
              <input id="include-no-title-checkbox" type="checkbox" />
              <span>Hide videos with no detected container title</span>
            </label>
            <p id="status" class="status">No files selected.</p>
          </div>
        </div>
      </section>

      <section class="panel results-panel">
        <div class="results-header">
          <h2>Detected Container Title</h2>
          <span id="result-count" class="count">0 files</span>
        </div>
        <div id="results" class="results" aria-live="polite"></div>
      </section>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
